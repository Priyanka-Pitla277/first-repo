# The name of the workflow visible in the GitHub Actions tab
name: Java CI with Maven or Gradle

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]      # Triggers on pushes to the main branch
  pull_request:
    branches: [ "main" ]      # Triggers when a PR is opened against main
  workflow_dispatch:          # Allows you to manually trigger this run from GitHub

jobs:
  build:
    # Runs on a fresh Ubuntu Linux virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Java Development Kit (JDK)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'       # Change to '11', '21', etc., depending on your project
          distribution: 'temurin'  # Eclipse Temurin is the industry standard distribution
          cache: 'maven'           # Changes to 'gradle' if you use Gradle instead

      # Step 3 (OPTION A): Build and Test using MAVEN
      # Delete this step if your project uses Gradle
      # - name: Build and Test with Maven
      #   run: mvn -B clean verify

      # Step 3 (OPTION B): Build and Test using GRADLE
      # Delete this step if your project uses Maven
      # Note: This automatically grants execution permissions to the gradle wrapper script
      - name: Build and Test with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build
