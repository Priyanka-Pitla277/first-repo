name: Simple Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  compile-and-run:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Java environment
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Step 3: Compile your Java source code
      # Replace 'Main.java' with the actual path to your main file (e.g., src/Main.java)
      - name: Compile Java Files
        run: javac com/practice/github/actions/Main.java

      # Step 4: Run your Java program to ensure it executes without crashing
      # Replace 'Main' with your actual compiled class name
      - name: Run Application
        run: java -cp . com.practice.github.actions.Main
