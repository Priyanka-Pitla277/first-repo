<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        .welcome-container {
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            border-radius: 8px;
            max-width: 600px;
            margin: 50px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .welcome-title {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .welcome-text {
            color: #7f8c8d;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1 class="welcome-title">Welcome to Our Website!</h1>
        <p class="welcome-text">We are thrilled to have you here. Explore our content and let us know if you need anything.</p>
    </div>

</body>
</html>
